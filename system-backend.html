<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後端開發部 - 蔬味平生中控中心</title>
    <style>
        :root {
            --primary-orange: #FF9400;
            --secondary-orange: #FF7D12;
            --cream: #FFE8CC;
            --dark-brown: #231815;
            --light-cream: #FFF5E6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Han Sans TC', 'PingFang SC', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--light-cream) 0%, #faf7f2 100%);
            color: var(--dark-brown);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-orange) 0%, var(--secondary-orange) 100%);
            color: white;
            padding: 1.5rem 1rem;
            box-shadow: 0 4px 12px rgba(255, 148, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .header-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.25);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--secondary-orange);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .monitoring-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: white;
            border: 3px solid var(--primary-orange);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 12px rgba(255, 148, 0, 0.1);
        }

        .metric-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .metric-label {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--secondary-orange);
        }

        .metric-status {
            font-size: 0.85rem;
            color: #27ae60;
            margin-top: 0.5rem;
            font-weight: 600;
        }

        .api-list {
            background: white;
            border: 3px solid var(--primary-orange);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 12px rgba(255, 148, 0, 0.1);
        }

        .api-item {
            padding: 1rem;
            border-left: 4px solid var(--primary-orange);
            margin-bottom: 1rem;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .api-item:last-child {
            margin-bottom: 0;
        }

        .api-method {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            margin-right: 0.5rem;
        }

        .api-method.get {
            background: #61affe;
            color: white;
        }

        .api-method.post {
            background: #49cc90;
            color: white;
        }

        .api-endpoint {
            font-family: 'Courier New', monospace;
            color: var(--dark-brown);
            font-weight: 600;
        }

        .api-status {
            float: right;
            color: #27ae60;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <script>
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'login.html';
        }
    </script>

    <header class="header">
        <div class="header-content">
            <div class="header-title">⚙️ 後端開發部 - 根仔</div>
            <div class="header-buttons">
                <button class="btn" onclick="goBack()">← 返回中控中心</button>
                <button class="btn" onclick="logout()">登出</button>
            </div>
        </div>
    </header>

    <div class="main-content">
        <div class="section-title">🔧 系統監控面板</div>

        <div class="monitoring-grid">
            <div class="metric-card">
                <div class="metric-icon">🟢</div>
                <div class="metric-label">伺服器狀態</div>
                <div class="metric-value">100%</div>
                <div class="metric-status">正常運作</div>
            </div>
            <div class="metric-card">
                <div class="metric-icon">⚡</div>
                <div class="metric-label">API 回應時間</div>
                <div class="metric-value">125ms</div>
                <div class="metric-status">優秀</div>
            </div>
            <div class="metric-card">
                <div class="metric-icon">💾</div>
                <div class="metric-label">資料庫連接</div>
                <div class="metric-value">5/10</div>
                <div class="metric-status">正常</div>
            </div>
            <div class="metric-card">
                <div class="metric-icon">📊</div>
                <div class="metric-label">每日請求量</div>
                <div class="metric-value">12.5K</div>
                <div class="metric-status">穩定</div>
            </div>
        </div>

        <div class="api-list">
            <h3 style="margin-bottom: 1.5rem; color: var(--dark-brown);">🔌 API 端點</h3>

            <div class="api-item">
                <span class="api-method get">GET</span>
                <span class="api-endpoint">/api/users</span>
                <span class="api-status">✓ 正常</span>
            </div>

            <div class="api-item">
                <span class="api-method post">POST</span>
                <span class="api-endpoint">/api/products</span>
                <span class="api-status">✓ 正常</span>
            </div>

            <div class="api-item">
                <span class="api-method get">GET</span>
                <span class="api-endpoint">/api/orders</span>
                <span class="api-status">✓ 正常</span>
            </div>

            <div class="api-item">
                <span class="api-method post">POST</span>
                <span class="api-endpoint">/api/analytics</span>
                <span class="api-status">✓ 正常</span>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
