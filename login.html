<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔬味平生 VEGALCHEMY - 登入</title>
    <style>
        :root {
            --primary-orange: #FF9400;
            --secondary-orange: #FF7D12;
            --cream: #FFE8CC;
            --dark-brown: #231815;
            --light-cream: #FFF5E6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Han Sans TC', 'PingFang SC', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--light-cream) 0%, #faf7f2 100%);
            color: var(--dark-brown);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            background: white;
            border: 3px solid var(--primary-orange);
            border-radius: 20px;
            padding: 3rem 2rem;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(255, 148, 0, 0.15);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--secondary-orange);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: #999;
            letter-spacing: 0.05em;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--dark-brown);
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px rgba(255, 148, 0, 0.1);
        }

        .login-button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, var(--primary-orange) 0%, var(--secondary-orange) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(255, 148, 0, 0.2);
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 148, 0, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }

        .demo-hint {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
            font-size: 0.85rem;
            color: #999;
        }

        .demo-hint strong {
            color: var(--primary-orange);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-title">🌱 蔬味平生</div>
            <div class="login-subtitle">VEGALCHEMY 中控中心</div>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">帳號</label>
                <input type="text" id="username" placeholder="輸入帳號" required>
            </div>

            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" placeholder="輸入密碼" required>
                <div class="error-message" id="errorMessage">帳號或密碼錯誤</div>
            </div>

            <button type="submit" class="login-button">登入中控中心</button>
        </form>

        <div class="demo-hint">
            Demo 帳號：<strong>admin</strong><br>
            Demo 密碼：<strong>admin</strong>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            // 簡單的 Demo 登入檢查
            if (username === 'admin' && password === 'admin') {
                // 存儲到 localStorage
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', username);

                // 重定向到中控中心
                window.location.href = 'index.html';
            } else {
                errorMessage.style.display = 'block';
                document.getElementById('password').value = '';
            }
        }
    </script>
</body>
</html>
